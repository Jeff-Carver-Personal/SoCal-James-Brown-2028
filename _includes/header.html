<header class="site-header">
  <div class="wrap">
    <a class="brand" href="{{ '/' | relative_url }}">
      <img src="{{ '/assets/images/logos/athletics-logo.jpg' | relative_url }}" alt="{{ site.team.name }} logo">
      <span class="brand-text">
        {{ site.team.short_name }}
        <small>{{ site.team.age_division }} Travel Softball</small>
      </span>
    </a>
    <nav class="main-nav">
      <a href="{{ '/' | relative_url }}" {% if page.url == '/' or page.url == '/index.html' %}class="active"{% endif %}>Home</a>
      <a href="{{ '/roster/' | relative_url }}" {% if page.url contains '/roster' %}class="active"{% endif %}>Roster</a>
      <a href="{{ '/schedule/' | relative_url }}" {% if page.url contains '/schedule' %}class="active"{% endif %}>Schedule</a>
    </nav>
  </div>
</header>
